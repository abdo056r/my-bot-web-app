<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>مساعد تصويب بيلياردو</title>
<style>
body {
  margin: 0;
  background: #0b5d3b;
  text-align: center;
  color: white;
  font-family: Arial;
}
canvas {
  background: #0e7a4f;
  margin-top: 20px;
  border: 5px solid #222;
  border-radius: 10px;
}
</style>
</head>
<body>

<h2>مساعد تصويب بيلياردو 🎱</h2>
<p>اضغط لتحديد الكرة البيضاء ثم الهدف</p>

<canvas id="table" width="350" height="600"></canvas>

<script>
const canvas = document.getElementById("table");
const ctx = canvas.getContext("2d");

let cueBall = null;
let targetBall = null;

canvas.addEventListener("click", function(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (!cueBall) {
    cueBall = {x, y};
  } else if (!targetBall) {
    targetBall = {x, y};
  } else {
    cueBall = {x, y};
    targetBall = null;
  }

  draw();
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // رسم الكرة البيضاء
  if (cueBall) {
    drawBall(cueBall.x, cueBall.y, "white");
  }

  // رسم الكرة الهدف
  if (targetBall) {
    drawBall(targetBall.x, targetBall.y, "red");

    // حساب الزاوية
    let angle = Math.atan2(targetBall.y - cueBall.y, targetBall.x - cueBall.x);

    // رسم خط التصويب
    ctx.beginPath();
    ctx.moveTo(cueBall.x, cueBall.y);
    ctx.lineTo(
      cueBall.x + Math.cos(angle) * 800,
      cueBall.y + Math.sin(angle) * 800
    );
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawBall(x, y, color) {
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}
</script>

</body>
</html>
